<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Anu ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe6f0,#fff5f8);
    font-family:Arial, sans-serif;
}

/* Container */
.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:85%;
    max-width:500px;
    z-index:2;
}

/* Heading */
h1{
    color:#ff4d88;
}

/* Photo */
.profile-pic{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #ffb3cc;
    margin:15px 0;
    animation:floatPic 3s ease-in-out infinite;
}

@keyframes floatPic{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* Buttons */
button{
    display:block;
    margin:10px auto;
    border:none;
    padding:12px 20px;
    border-radius:25px;
    background:#ff4d88;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* Text */
#typing, #reason, #surprise{
    margin-top:15px;
    color:#444;
}

/* Floating hearts */
.heart{
    position:absolute;
    bottom:-20px;
    color:#ff7aa8;
    animation:float 7s linear infinite;
}

@keyframes float{
    from{transform:translateY(0); opacity:1;}
    to{transform:translateY(-110vh); opacity:0;}
}

/* Bear */
.bear{
    position:fixed;
    bottom:10px;
    right:10px;
    width:90px;
}
</style>
</head>

<body>

<div class="container">

    <h1>Hey Anu ❤️</h1>

    <img src="photo.jpeg" class="profile-pic">

    <div id="typing"></div>

    <button onclick="showMessage()">Click When You're Tired Anu 💖</button>

    <button onclick="showReason()">Why Am I Proud Of You, Anu?</button>

    <button onclick="showFuture()">See Your Future ✨</button>

    <p id="reason"></p>
    <div id="surprise"></div>

</div>

<img src="bear.gif" class="bear">

<script>

// 💖 Typing message
const text =
"Hey Anu ❤️ just a small reminder that I'm really proud of you. You're working so hard for your future and I see every bit of it 💖";

let i = 0;
function typeWriter(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}
typeWriter();

// 💌 Motivation popup
function showMessage(){
    const msgs = [
        "Take a deep breath, Anu ❤️",
        "You're doing amazing 🌟",
        "Rest a little, you deserve it ☕",
        "Drink some water 💧",
        "I'm always proud of you, Baby 🥰"
    ];

    alert(msgs[Math.floor(Math.random()*msgs.length)]);
}

// 🌸 Proud messages
function showReason(){
    const reasons = [
        "Anu, because you never give up ❤️",
        "Because you're building your future 🌟",
        "Because you're strong 💪",
        "Because you're special just the way you are ❤️"
    ];

    document.getElementById("reason").innerHTML =
    reasons[Math.floor(Math.random()*reasons.length)];
}

// 🚀 Future screen
function showFuture(){
    document.getElementById("surprise").innerHTML = `
    <br><b>Hey Anu, Your Future is Bright ✨</b><br><br>
    🎓 Successful Career<br>
    💰 Financial Stability<br>
    🌍 Big Dreams Achieved<br>
    ❤️ Someone Who Is Always Proud of You<br><br>
    Keep going Anu, you're doing amazing 💖
    `;
}

// ❤️ Floating hearts
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20+10) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove();},7000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
